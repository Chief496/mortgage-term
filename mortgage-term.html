<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Term</title>
    <link rel="stylesheet" href="mortgage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="maincontainer">
        <div class="subcontainer1">
            <h1>Mortgage Calculator</h1>
            <a href="">clear all</a> <br> <br>
            <form>
                <label>Mortgage Amount</label>
                <div class="input-group">
                    <span class="prefix">€</span>
                    <input type="text" value="300,000">
                </div>
                <label>Mortgage Term</label>
                <div class="input-group">
                    <input type="text" value="25">
                    <span class="suffix">Years</span>
                </div>
                <label>Mortgage Rate</label>
                <div class="input-group">
                    <input type="text" value="5.25">
                    <span class="neffix">%</span>
                </div>

                <label>Mortgage type</label> <br> <br>
                <div class="rt"><input type="radio">
                <label for="">Repayment</label></div> <br> <br>
               <div class="io"> <input type="radio">
                <label for="">Interest only</label></div> <br> <br>

                <button><i class="fa-solid fa-calculator"></i>Calculate Repayment</button>
            </form>
        </div>
        <div class="subcontainer2">
            <h2>Your results</h2>
            <p>Your results are showed below based on the information you peovided. To adjust the results, edit the form and click "calculate repayment" again.</p>

            <div class="downbox">
               <div class="mon"> Your monthly repayment</div>
                <div class="euros">$1,797.74</div>
                <hr>
                <div class="mon">Total you'll pay over the term</div>
               <div class="moni"> <p>$539,322.92</p></div>
            </div>
        </div>
    </div>
</body>
</html>
